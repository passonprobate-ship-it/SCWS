# Security headers for SPAWN
# Included in the main server block

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking
add_header X-Frame-Options "DENY" always;

# Control referrer information
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Basic permissions policy
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

# Content Security Policy — allows inline scripts/styles (SPA needs them) + CDN assets
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; connect-src 'self' ws: wss:; img-src 'self' data: blob:; font-src 'self' https://cdn.jsdelivr.net; frame-src 'self'" always;
